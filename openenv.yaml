name: traffic-signal-env
description: Hierarchical Multi-Agent Traffic Orchestration Benchmark with Central Oversight and Deterministic Incidents.
version: "1.1"
entry_point: app.main:app
deterministic: true
multi_agent: true
reward_range: [-1.0, 1.0]

observation_space:
  type: dict
  description: Per-intersection observations keyed by intersection ID (NW, NE, SW, SE)
  spaces:
    queue_lengths:
      type: dict
      description: "Queue lengths per intersection: {NW: [4 floats], NE: [...], SW: [...], SE: [...]}"
      values: {type: Box, low: 0, high: 24, shape: [4]}
    waiting_times:
      type: dict
      description: "Waiting times per intersection: {NW: [4 floats], ...}"
      values: {type: Box, low: 0, high: 1000, shape: [4]}
    current_phase:
      type: dict
      description: "Current signal phase per intersection: {NW: int, ...}"
      values: {type: Discrete, n: 4}
    time_in_phase:
      type: dict
      description: "Steps in current phase per intersection: {NW: int, ...}"
      values: {type: Discrete, n: 100}
    policy:
      type: dict
      description: "Central policy vector (5 floats)"
      values: {type: Box, low: 0, high: 6, shape: [5]}
    text_obs:
      type: Text
      description: "Structured YAML-like observation designed for LLM ingestion"

action_space:
  type: dict
  spaces:
    local_actions:
      type: dict
      values:
        type: Discrete
        n: 6
        actions: [KEEP, SWITCH, PHASE_0, PHASE_1, PHASE_2, PHASE_3]
    central_action:
      type: dict
      values:
        type: Box
        low: -0.5
        high: 0.8
        shape: [5]
        keys: [switch_penalty, queue_urgency_weight, emergency_boost, corridor_priority, balance_penalty]

endpoints:
  reset: /reset
  step: /step
  state: /state
  metadata: /metadata

tasks:
  - id: easy_fixed
    grader: graders.grader_easy:grade
  - id: medium_dynamic
    grader: graders.grader_medium:grade
  - id: hard_multi
    grader: graders.grader_hard:grade
  - id: gridlock_risk
    grader: graders.grader_gridlock:grade
  - id: corridor_flow
    grader: graders.grader_corridor:grade
  - id: incident_response
    grader: graders.grader_incident:grade
  - id: dynamic_demand
    grader: graders.grader_dynamic:grade

themes:
  - "Theme 1: Multi-Agent Interactions"
  - "Theme 2: Long-Horizon Planning"
  - "Theme 4: Self-Improvement"
  - "Sub-theme: Fleet AI Scalable Oversight"
  - "Sub-theme: Halluminate Multi-Actor"
